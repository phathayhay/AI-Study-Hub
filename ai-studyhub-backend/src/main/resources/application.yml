server:
  forward-headers-strategy: framework

spring:
  application:
    name: ai-studyhub-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ai_studyhub}?useSSL=${DB_SSL:false}&verifyServerCertificate=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# ── JWT ──────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:ai-studyhub-super-secret-key-change-in-production-2025}
  expiration-ms: 86400000      # 24 hours
  reset-token-expiry-ms: 900000 # 15 minutes

# ── Cloudinary ───────────────────────────────────────────────
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

# ── Gemini AI ────────────────────────────────────────────────
gemini:
  api-key: ${GEMINI_API_KEY}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  project-id: ${GOOGLE_CLOUD_PROJECT_ID}
  location: us-central1
  max-tokens: 8192
  temperature: 0.7

# ── Local AI (Ollama) ────────────────────────────────────────
ai:
  provider: ${AI_PROVIDER:GEMINI}
  ollama:
    base-url: ${OLLAMA_API_BASE:http://localhost:11434}
    model: ${OLLAMA_MODEL:qwen2.5}

# ── Swagger / OpenAPI ────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    persist-authorization: true

# ── App config ───────────────────────────────────────────────
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  allowed-origins: ${FRONTEND_ALLOWED_ORIGINS:${FRONTEND_URL:http://localhost:5173}}
  upload:
    allowed-types: PDF,DOCX,PPTX
    max-size-bytes: 52428800  # 50 MB
  payment:
    provider: ${PAYMENT_PROVIDER:CUSTOM_SANDBOX}
    mode: ${PAYMENT_MODE:SANDBOX}
    provider-name: ${PAYMENT_PROVIDER_NAME:BANK_TRANSFER}
    bank-name: ${PAYMENT_BANK_NAME:TPBank}
    account-name: ${PAYMENT_ACCOUNT_NAME:CONG TY AI STUDYHUB FPT}
    account-number: ${PAYMENT_ACCOUNT_NUMBER:00004103937}
    order-expiry-minutes: ${PAYMENT_ORDER_EXPIRY_MINUTES:30}
    webhook-secret: ${PAYMENT_WEBHOOK_SECRET:}
    sandbox-signing-secret: ${PAYMENT_SANDBOX_SIGNING_SECRET:}
    sandbox-return-url: ${PAYMENT_SANDBOX_RETURN_URL:http://localhost:5173/payment-result}
    production-base-url: ${PAYMENT_PRODUCTION_BASE_URL:}
    production-client-id: ${PAYMENT_PRODUCTION_CLIENT_ID:}
    production-secret-key: ${PAYMENT_PRODUCTION_SECRET_KEY:}
    vnpay:
      version: ${VNPAY_VERSION:2.1.0}
      command: ${VNPAY_COMMAND:pay}
      tmn-code: ${VNPAY_TMN_CODE:}
      hash-secret: ${VNPAY_HASH_SECRET:}
      payment-url: ${VNPAY_PAYMENT_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      api-url: ${VNPAY_API_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}
      return-url: ${VNPAY_RETURN_URL:http://localhost:8080/api/payments/vnpay/return}
      ipn-url: ${VNPAY_IPN_URL:}
      frontend-result-url: ${FRONTEND_PAYMENT_RESULT_URL:http://localhost:5173/payment-result}
      expiry-minutes: ${VNPAY_EXPIRY_MINUTES:15}
